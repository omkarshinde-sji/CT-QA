<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authenticating...</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      margin: 0;
      background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
      color: white;
    }
    .container {
      text-align: center;
      padding: 2rem;
    }
    .spinner {
      width: 50px;
      height: 50px;
      border: 4px solid rgba(255,255,255,0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin: 0 auto 1rem;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
    h2 { margin: 0 0 0.5rem; }
    p { margin: 0; opacity: 0.8; }
    .error { color: #ff6b6b; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; margin-top: 1rem; }
    .success { color: #69db7c; background: rgba(0,0,0,0.2); padding: 1rem; border-radius: 8px; margin-top: 1rem; }
  </style>
</head>
<body>
  <div class="container">
    <div id="spinner" class="spinner"></div>
    <h2 id="title">Authenticating...</h2>
    <p id="subtitle">Please wait while we complete your sign-in.</p>
    <div id="message" style="display: none;"></div>
  </div>
  
  <script>
    // Parse hash fragment for token response
    function parseHashParams() {
      const hash = window.location.hash.substring(1);
      const params = {};
      hash.split('&').forEach(function(part) {
        const item = part.split('=');
        params[item[0]] = decodeURIComponent(item[1]);
      });
      return params;
    }
    
    // Main function
    function handleCallback() {
      const params = parseHashParams();
      const messageEl = document.getElementById('message');
      const spinnerEl = document.getElementById('spinner');
      const titleEl = document.getElementById('title');
      const subtitleEl = document.getElementById('subtitle');
      
      // Check for error
      if (params.error) {
        spinnerEl.style.display = 'none';
        titleEl.textContent = 'Authentication Failed';
        subtitleEl.textContent = '';
        messageEl.className = 'error';
        messageEl.textContent = params.error_description || params.error;
        messageEl.style.display = 'block';
        
        if (window.opener) {
          window.opener.postMessage({
            type: 'MSAL_AUTH_ERROR',
            error: params.error_description || params.error
          }, window.location.origin);
          setTimeout(function() { window.close(); }, 3000);
        }
        return;
      }
      
      // Check for access token (implicit flow)
      if (params.access_token) {
        spinnerEl.style.display = 'none';
        titleEl.textContent = 'Success!';
        subtitleEl.textContent = 'Completing sign-in...';
        messageEl.className = 'success';
        messageEl.textContent = 'Authentication successful. This window will close automatically.';
        messageEl.style.display = 'block';
        
        if (window.opener) {
          window.opener.postMessage({
            type: 'MSAL_AUTH_SUCCESS',
            accessToken: params.access_token,
            idToken: params.id_token,
            account: {
              // We don't have full account info in hash, but token is enough
            }
          }, window.location.origin);
          setTimeout(function() { window.close(); }, 500);
        } else {
          // No opener, store and redirect
          sessionStorage.setItem('msal_auth_response', JSON.stringify({
            accessToken: params.access_token,
            idToken: params.id_token
          }));
          window.location.href = '/admin/integrations/microsoft-teams';
        }
        return;
      }
      
      // No token in hash - show waiting message
      // This might happen if the page loads before redirect
      subtitleEl.textContent = 'Waiting for authentication response...';
      
      // Wait a bit then show error if still no response
      setTimeout(function() {
        if (!window.location.hash || window.location.hash === '#') {
          spinnerEl.style.display = 'none';
          titleEl.textContent = 'No Response';
          subtitleEl.textContent = '';
          messageEl.className = 'error';
          messageEl.textContent = 'No authentication response received. This window may close automatically.';
          messageEl.style.display = 'block';
          
          if (window.opener) {
            window.opener.postMessage({
              type: 'MSAL_AUTH_ERROR',
              error: 'No authentication response received'
            }, window.location.origin);
          }
        }
      }, 5000);
    }
    
    // Run on page load
    handleCallback();
  </script>
</body>
</html>
